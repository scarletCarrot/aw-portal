# Render Infrastructure-as-Code config.
# When you connect a GitHub repo containing this file, Render uses it to
# auto-fill the service settings on first import — no clicking through forms.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: aw-portal
    runtime: docker
    plan: free                 # 512MB RAM, sleeps after 15 min of no traffic.
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login    # Cheap public route that always returns 200.
    autoDeploy: true           # Re-deploy on every push to the connected branch.
    envVars:
      - key: AW_SECRET_KEY
        generateValue: true    # Render generates a random secret on first deploy.
      - key: PYTHONUNBUFFERED
        value: "1"
