{% extends "layout.html" %}

{% block subtitle %}Register{% endblock %}

{% block content %}
<div class="auth-card">
  <h2 style="margin-top:0;">Register</h2>
  {% if bootstrap %}
    <p class="hint" style="color:var(--brand);">No users yet — you'll become the first administrator.</p>
  {% else %}
    <p class="hint">An existing teammate must be logged in to add you.</p>
  {% endif %}

  <form method="post">
    <div style="margin-bottom:14px;">
      <label>Name (optional)</label>
      <input type="text" name="name" value="{{ name or '' }}">
    </div>
    <div style="margin-bottom:14px;">
      <label>Email</label>
      <input type="email" name="email" value="{{ email or '' }}" required>
    </div>
    <div style="margin-bottom:18px;">
      <label>Password (min 6 characters)</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn-primary" style="width:100%;">Create account</button>
  </form>

  <div style="margin-top:18px;font-size:12px;color:var(--muted);text-align:center;">
    Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
  </div>
</div>
{% endblock %}
